server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location = /llms.txt {
        default_type "text/plain; charset=utf-8";
    }

    location = /api/health {
        proxy_http_version 1.1;
        proxy_set_header Host api.cookey.sh;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://api:5800/health;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host api.cookey.sh;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://api:5800/;
    }
}
