name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag (for example v1.2.3)
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor == 'Lakr233'
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.prepare.outputs.build_version }}
      publish_release: ${{ steps.prepare.outputs.publish_release }}
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
    steps:
      - name: Resolve build metadata
        id: prepare
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Release version is required." >&2
            exit 1
          fi

          echo "build_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_release=true" >> "$GITHUB_OUTPUT"
          echo "artifact_name=cookey-${VERSION}-unsigned" >> "$GITHUB_OUTPUT"

  build_macos:
    if: github.actor == 'Lakr233'
    name: Build macOS CLI
    runs-on: macos-26
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build universal CLI
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage build-cli

      - name: Package unsigned CLI
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage package-cli

      - name: Upload unsigned CLI
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: build/releases/${{ needs.prepare.outputs.build_version }}/unsigned-cli/cookey
          if-no-files-found: error

  build_linux_x86_64:
    if: github.actor == 'Lakr233'
    name: Build Linux x86_64 CLI
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod

      - name: Build and package Linux x86_64 CLI
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.build_version }}"
          RELEASE_DIR="build/releases/${TAG}"
          mkdir -p "${RELEASE_DIR}"
          (
            cd CommandLineTool
            GOOS=linux GOARCH=amd64 go build -o "../${RELEASE_DIR}/cookey" .
          )
          chmod 755 "${RELEASE_DIR}/cookey"
          rm -f "${RELEASE_DIR}/cookey-${TAG}-linux-x86_64.zip"
          zip -j "${RELEASE_DIR}/cookey-${TAG}-linux-x86_64.zip" "${RELEASE_DIR}/cookey"

      - name: Upload Linux x86_64 artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64
          path: build/releases/${{ needs.prepare.outputs.build_version }}/cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64.zip
          if-no-files-found: error

  build_linux_aarch64:
    if: github.actor == 'Lakr233'
    name: Build Linux aarch64 CLI
    runs-on: ubuntu-24.04-arm
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod

      - name: Build and package Linux aarch64 CLI
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.build_version }}"
          RELEASE_DIR="build/releases/${TAG}"
          mkdir -p "${RELEASE_DIR}"
          (
            cd CommandLineTool
            GOOS=linux GOARCH=arm64 go build -o "../${RELEASE_DIR}/cookey" .
          )
          chmod 755 "${RELEASE_DIR}/cookey"
          rm -f "${RELEASE_DIR}/cookey-${TAG}-linux-aarch64.zip"
          zip -j "${RELEASE_DIR}/cookey-${TAG}-linux-aarch64.zip" "${RELEASE_DIR}/cookey"

      - name: Upload Linux aarch64 artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64
          path: build/releases/${{ needs.prepare.outputs.build_version }}/cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64.zip
          if-no-files-found: error

  sign_notarize_macos:
    if: github.actor == 'Lakr233'
    name: Sign and notarize macOS CLI
    runs-on: macos-26
    needs: [prepare, build_macos]
    env:
      PRESERVE_KEYCHAIN_STATE: "1"
      KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Download unsigned CLI
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: build/releases/${{ needs.prepare.outputs.build_version }}/unsigned-cli

      - name: Set up CI keychain
        id: keychain
        env:
          KEYCHAIN_CONTENT_GZIP: ${{ secrets.KEYCHAIN_CONTENT_GZIP }}
        run: bash Scripts/setup-ci-keychain.sh --output-file "$GITHUB_OUTPUT"

      - name: Sign macOS CLI
        env:
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.keychain.outputs.keychain_profile }}
          SIGNING_IDENTITY: ${{ steps.keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.keychain.outputs.development_team }}
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage sign-cli

      - name: Notarize macOS CLI
        env:
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.keychain.outputs.keychain_profile }}
          SIGNING_IDENTITY: ${{ steps.keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.keychain.outputs.development_team }}
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage notarize-cli

      - name: Upload signed macOS artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-macOS
          path: build/releases/${{ needs.prepare.outputs.build_version }}/cookey-${{ needs.prepare.outputs.build_version }}-macOS-cli.zip
          if-no-files-found: error

  collect_release:
    if: github.actor == 'Lakr233' && needs.prepare.outputs.publish_release == 'true'
    name: Collect and publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_linux_x86_64
      - build_linux_aarch64
      - sign_notarize_macos
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-macOS
          path: build/release-assets/macos

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64
          path: build/release-assets/linux-x86_64

      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64
          path: build/release-assets/linux-aarch64

      - name: Assemble stable release assets
        run: |
          set -euo pipefail
          mkdir -p build/release-assets/final
          cp "build/release-assets/macos/cookey-${{ needs.prepare.outputs.build_version }}-macOS-cli.zip" "build/release-assets/final/cookey-macOS.zip"
          cp "build/release-assets/linux-x86_64/cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64.zip" "build/release-assets/final/cookey-linux-x86_64.zip"
          cp "build/release-assets/linux-aarch64/cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64.zip" "build/release-assets/final/cookey-linux-aarch64.zip"
          cp skills/cookey/SKILL.md build/release-assets/final/skills.md
          # IMPORTANT: These stable names must match the URLs in:
          #   Web/get-started.html, Web/llms.txt, skills.md
          (
            cd build/release-assets/final
            sha256sum cookey-macOS.zip cookey-linux-x86_64.zip cookey-linux-aarch64.zip skills.md > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.build_version }}
          generate_release_notes: true
          files: |
            build/release-assets/final/cookey-macOS.zip
            build/release-assets/final/cookey-linux-x86_64.zip
            build/release-assets/final/cookey-linux-aarch64.zip
            build/release-assets/final/skills.md
            build/release-assets/final/checksums.txt
