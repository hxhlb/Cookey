name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag (for example v1.2.3)
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.prepare.outputs.build_version }}
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
    steps:
      - name: Resolve build metadata
        id: prepare
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Release version is required." >&2
            exit 1
          fi

          echo "build_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=cookey-${VERSION}-unsigned" >> "$GITHUB_OUTPUT"

  build_macos:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Build macOS CLI
    runs-on: macos-26
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build universal CLI
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage build-cli

      - name: Package unsigned CLI
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage package-cli

      - name: Upload unsigned CLI
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: build/releases/${{ needs.prepare.outputs.build_version }}/unsigned-cli/cookey
          if-no-files-found: error

  build_linux_x86_64:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Build Linux x86_64 CLI
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod

      - name: Build and package Linux x86_64 CLI
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.build_version }}"
          RELEASE_DIR="build/releases/${TAG}"
          mkdir -p "${RELEASE_DIR}"
          (
            cd CommandLineTool
            GOOS=linux GOARCH=amd64 go build -o "../${RELEASE_DIR}/cookey" .
          )
          chmod 755 "${RELEASE_DIR}/cookey"
          rm -f "${RELEASE_DIR}/cookey-${TAG}-linux-x86_64.zip"
          zip -j "${RELEASE_DIR}/cookey-${TAG}-linux-x86_64.zip" "${RELEASE_DIR}/cookey"

      - name: Upload Linux x86_64 artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64
          path: build/releases/${{ needs.prepare.outputs.build_version }}/cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64.zip
          if-no-files-found: error

  build_linux_aarch64:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Build Linux aarch64 CLI
    runs-on: ubuntu-24.04-arm
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod

      - name: Build and package Linux aarch64 CLI
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.build_version }}"
          RELEASE_DIR="build/releases/${TAG}"
          mkdir -p "${RELEASE_DIR}"
          (
            cd CommandLineTool
            GOOS=linux GOARCH=arm64 go build -o "../${RELEASE_DIR}/cookey" .
          )
          chmod 755 "${RELEASE_DIR}/cookey"
          rm -f "${RELEASE_DIR}/cookey-${TAG}-linux-aarch64.zip"
          zip -j "${RELEASE_DIR}/cookey-${TAG}-linux-aarch64.zip" "${RELEASE_DIR}/cookey"

      - name: Upload Linux aarch64 artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64
          path: build/releases/${{ needs.prepare.outputs.build_version }}/cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64.zip
          if-no-files-found: error

  build_android:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Build Android release bundle
    runs-on: ubuntu-latest
    needs: prepare
    defaults:
      run:
        working-directory: Frontend/Android
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Android release secrets
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            ANDROID_UPLOAD_KEYSTORE_BASE64 \
            ANDROID_UPLOAD_STORE_PASSWORD \
            ANDROID_UPLOAD_KEY_ALIAS \
            ANDROID_UPLOAD_KEY_PASSWORD \
            GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64
          do
            if [[ -z "${!name}" ]]; then
              missing+=("${name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing Android release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Decode Android upload keystore
        id: android_signing
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="${RUNNER_TEMP}/cookey-upload.jks"
          printf '%s' "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          echo "keystore_path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Resolve Android version metadata
        id: android_version
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          VERSION_NAME="${{ needs.prepare.outputs.build_version }}"
          VERSION_NAME="${VERSION_NAME#v}"
          zsh ../../Scripts/resolve-android-version.sh \
            --package-name "wiki.qaq.cookey" \
            --version-name "${VERSION_NAME}" \
            --output-file "$GITHUB_OUTPUT"

      - name: Build signed Android release artifacts
        env:
          COOKEY_UPLOAD_STORE_FILE: ${{ steps.android_signing.outputs.keystore_path }}
          COOKEY_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          COOKEY_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          COOKEY_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          COOKEY_VERSION_CODE: ${{ steps.android_version.outputs.version_code }}
          COOKEY_VERSION_NAME: ${{ steps.android_version.outputs.version_name }}
        run: ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Stage Android release artifact files
        run: |
          set -euo pipefail
          mkdir -p build/release-exports/android
          cp app/build/outputs/apk/release/app-release.apk build/release-exports/android/cookey-android.apk
          cp app/build/outputs/bundle/release/app-release.aab build/release-exports/android/cookey-android.aab

      - name: Upload signed Android artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-android
          path: |
            Frontend/Android/build/release-exports/android/cookey-android.apk
            Frontend/Android/build/release-exports/android/cookey-android.aab
          if-no-files-found: error

      - name: Publish Android internal release to Google Play
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          zsh ../../Scripts/publish-android-to-play.sh \
            --package-name "wiki.qaq.cookey" \
            --track "internal" \
            --bundle-file "app/build/outputs/bundle/release/app-release.aab" \
            --release-name "${{ steps.android_version.outputs.version_name }}" \
            --version-code "${{ steps.android_version.outputs.version_code }}"

  sign_notarize_macos:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Sign and notarize macOS CLI
    runs-on: macos-26
    needs: [prepare, build_macos]
    env:
      PRESERVE_KEYCHAIN_STATE: "1"
      KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Download unsigned CLI
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: build/releases/${{ needs.prepare.outputs.build_version }}/unsigned-cli

      - name: Set up CI keychain
        id: keychain
        env:
          KEYCHAIN_CONTENT_GZIP: ${{ secrets.KEYCHAIN_CONTENT_GZIP }}
        run: bash Scripts/setup-ci-keychain.sh --output-file "$GITHUB_OUTPUT"

      - name: Sign macOS CLI
        env:
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.keychain.outputs.keychain_profile }}
          SIGNING_IDENTITY: ${{ steps.keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.keychain.outputs.development_team }}
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage sign-cli

      - name: Notarize macOS CLI
        env:
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.keychain_path }}
          KEYCHAIN_PROFILE: ${{ steps.keychain.outputs.keychain_profile }}
          SIGNING_IDENTITY: ${{ steps.keychain.outputs.signing_identity }}
          DEVELOPMENT_TEAM: ${{ steps.keychain.outputs.development_team }}
        run: bash Scripts/build-release.sh --tag "${{ needs.prepare.outputs.build_version }}" --stage notarize-cli

      - name: Upload signed macOS artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-macOS
          path: build/releases/${{ needs.prepare.outputs.build_version }}/cookey-${{ needs.prepare.outputs.build_version }}-macOS-cli.zip
          if-no-files-found: error

  collect_release:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Collect and publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_linux_x86_64
      - build_linux_aarch64
      - build_android
      - sign_notarize_macos
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-macOS
          path: build/release-assets/macos

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64
          path: build/release-assets/linux-x86_64

      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64
          path: build/release-assets/linux-aarch64

      - name: Download Android artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-${{ needs.prepare.outputs.build_version }}-android
          path: build/release-assets/android

      - name: Assemble stable release assets
        run: |
          set -euo pipefail
          mkdir -p build/release-assets/final
          cp "build/release-assets/macos/cookey-${{ needs.prepare.outputs.build_version }}-macOS-cli.zip" "build/release-assets/final/cookey-macOS.zip"
          cp "build/release-assets/linux-x86_64/cookey-${{ needs.prepare.outputs.build_version }}-linux-x86_64.zip" "build/release-assets/final/cookey-linux-x86_64.zip"
          cp "build/release-assets/linux-aarch64/cookey-${{ needs.prepare.outputs.build_version }}-linux-aarch64.zip" "build/release-assets/final/cookey-linux-aarch64.zip"
          cp "build/release-assets/android/cookey-android.apk" "build/release-assets/final/cookey-android.apk"
          cp "build/release-assets/android/cookey-android.aab" "build/release-assets/final/cookey-android.aab"
          cp skills/website-login/SKILL.md build/release-assets/final/skills.md
          # IMPORTANT: These stable names must match the URLs in:
          #   Web/get-started.html, Web/llms.txt, skills.md
          (
            cd build/release-assets/final
            find . -maxdepth 1 -type f ! -name checksums.txt -print0 | sort -z | xargs -0 sha256sum > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.build_version }}
          draft: false
          generate_release_notes: true
          files: build/release-assets/final/*

  build_packages:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Build npm and pip packages
    runs-on: ubuntu-latest
    needs: prepare
    defaults:
      run:
        working-directory: CommandLineTool
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod
          cache-dependency-path: CommandLineTool/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run CLI tests
        run: go test ./...

      - name: Build npm packages
        run: node ./scripts/build-npm-package.mjs

      - name: Build pip package source
        run: node ./scripts/build-pip-package.mjs

      - name: Build pip distributions
        run: |
          python -m pip install --upgrade build
          python -m build --outdir ./dist/pip/dist ./dist/pip/package

      - name: Upload npm packages
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-npm-packages
          path: CommandLineTool/dist/npm/**/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload pip distributions
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-pip-distributions
          path: CommandLineTool/dist/pip/dist/**/*
          if-no-files-found: error
          retention-days: 14

  publish_npm:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Publish npm packages
    needs: [prepare, build_packages]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: CommandLineTool
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download npm packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-npm-packages
          path: CommandLineTool/dist/npm

      - name: Restore executable bits
        run: |
          find ./dist/npm -type f \( -path '*/bin/cookey' -o -path '*/bin/cookey.js' \) -exec chmod 755 {} +

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Publish npm packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: node ./scripts/publish-npm-packages.mjs --skip-build

  publish_pypi:
    if: github.actor == 'Lakr233' || github.actor == 'eyhn'
    name: Publish PyPI package
    needs: [prepare, build_packages]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download pip distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: cookey-pip-distributions
          path: dist/pip

      - name: Publish PyPI package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pip
          skip-existing: true
