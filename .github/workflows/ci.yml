name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    name: Android Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Android
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android debug app
        run: ./gradlew --no-daemon lint testDebugUnitTest assembleDebug

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cookey-android-debug-apk
          path: Frontend/Android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    name: iOS Build
    runs-on: macos-26
    defaults:
      run:
        working-directory: Frontend/Apple
    steps:
      - uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Cache Xcode Swift packages
        uses: actions/cache@v4
        with:
          path: Frontend/Apple/.spm
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('Frontend/Apple/Cookey.xcodeproj/project.pbxproj', 'Frontend/Apple/**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-xcode-spm-

      - name: Resolve iOS package dependencies
        run: |
          set -o pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project Cookey.xcodeproj \
            -scheme Cookey \
            -clonedSourcePackagesDirPath .spm \
            | xcbeautify

      - name: Build iOS app with ad-hoc signing
        run: |
          set -o pipefail
          xcodebuild \
            -project Cookey.xcodeproj \
            -scheme Cookey \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath .spm \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY=- \
            build \
            | xcbeautify

  ios-tests:
    name: iOS Tests (${{ matrix.shard.name }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: Browser + Session
            test_args: >-
              -only-testing:CookeyTests/BrowserCaptureModelTests
              -only-testing:CookeyTests/CapturedSessionCodingTests
              -only-testing:CookeyTests/CryptoBoxOpenTests
          - name: Keys + Storage
            test_args: >-
              -only-testing:CookeyTests/DeviceKeyManagerTests
              -only-testing:CookeyTests/KeyFingerprintTests
              -only-testing:CookeyTests/LogStoreTests
          - name: App Flows
            test_args: >-
              -only-testing:CookeyTests/CookeyTests
              -only-testing:CookeyTests/DeepLinkTests
    defaults:
      run:
        working-directory: Frontend/Apple
    steps:
      - uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Cache Xcode Swift packages
        uses: actions/cache@v4
        with:
          path: Frontend/Apple/.spm
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('Frontend/Apple/Cookey.xcodeproj/project.pbxproj', 'Frontend/Apple/**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-xcode-spm-

      - name: Resolve iOS package dependencies
        run: |
          set -o pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project Cookey.xcodeproj \
            -scheme Cookey \
            -clonedSourcePackagesDirPath .spm \
            | xcbeautify

      - name: Resolve iOS test destination
        run: |
          set -euo pipefail

          devices_file="$(mktemp)"
          attempts=0
          until xcrun simctl list --json devices available > "${devices_file}"; do
            attempts=$((attempts + 1))
            if [ "${attempts}" -ge 3 ]; then
              echo "Failed to query available simulators after ${attempts} attempts." >&2
              exit 1
            fi
            sleep 5
          done

          python3 - "${devices_file}" "${GITHUB_ENV}" <<'PY'
          import json
          import pathlib
          import sys

          devices_payload = json.loads(
              pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")
          )
          candidates = []

          for runtime_id, devices in devices_payload.get("devices", {}).items():
              if ".SimRuntime.iOS-" not in runtime_id:
                  continue

              version_label = runtime_id.rsplit("iOS-", 1)[-1].replace("-", ".")
              version_tuple = tuple(
                  int(part) for part in version_label.split(".") if part.isdigit()
              )

              for device in devices:
                  if not device.get("isAvailable", False):
                      continue

                  name = device["name"].strip()
                  device_id = device["udid"].strip()
                  state = device.get("state", "Unknown").strip()
                  is_iphone = name.startswith("iPhone")
                  is_clone = name.startswith("Clone ")
                  candidates.append(
                      (
                          0 if is_iphone else 1,
                          0 if not is_clone else 1,
                          tuple(-part for part in version_tuple),
                          name.lower(),
                          name,
                          version_label,
                          device_id,
                          state,
                      )
                  )

          if not candidates:
              print(devices_payload, file=sys.stderr)
              raise SystemExit(
                  "No available iOS Simulator devices were returned by simctl."
              )

          candidates.sort()
          _, _, _, _, name, os_version, device_id, state = candidates[0]
          with pathlib.Path(sys.argv[2]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"IOS_TEST_DESTINATION=id={device_id}\n")
              env_file.write(f"IOS_TEST_DEVICE_ID={device_id}\n")

          print(
              "Using iOS Simulator destination: "
              f"{name} ({os_version}) [{device_id}] state={state}"
          )
          PY

          xcrun simctl boot "${IOS_TEST_DEVICE_ID}" || true
          xcrun simctl bootstatus "${IOS_TEST_DEVICE_ID}" -b

      - name: Run iOS tests with ad-hoc signing
        run: |
          set -o pipefail
          xcodebuild \
            -project Cookey.xcodeproj \
            -scheme Cookey \
            -configuration Debug \
            -destination "${IOS_TEST_DESTINATION}" \
            -destination-timeout 180 \
            -clonedSourcePackagesDirPath .spm \
            -parallel-testing-enabled YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY=- \
            test \
            ${{ matrix.shard.test_args }} \
            | xcbeautify

  cli:
    name: CLI Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CommandLineTool/go.mod

      - name: Build and test CLI
        run: |
          cd CommandLineTool
          go build ./...
          go test ./...

  web:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  web-docker:
    name: Web Docker Build
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web Docker image
        uses: docker/build-push-action@v6
        with:
          context: Web
          file: Web/Dockerfile
          push: false
          tags: cookey-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  server-docker:
    name: Server Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server Docker image
        uses: docker/build-push-action@v6
        with:
          context: Server
          file: Server/Dockerfile
          push: false
          tags: cookey-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
